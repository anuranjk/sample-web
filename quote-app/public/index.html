<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Quote App</h1>

    <div class="container">
        <h2>Submit a New Quote</h2>
        <form id="quote-form">
            <input type="text" id="quote-text" placeholder="Enter your quote..." required>
            <button type="submit">Submit Quote</button>
        </form>
    </div>

    <div class="container">
        <h2>Random Quote</h2>
        <button id="random-quote-btn">Get Random Quote</button>
        <p id="random-quote-display"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
